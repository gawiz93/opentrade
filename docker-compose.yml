services:
  db:
    image: pgvector/pgvector:pg16
    container_name: opentrade-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: opentrade
      POSTGRES_PASSWORD: opentrade
      POSTGRES_DB: opentrade
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "127.0.0.1:5433:5432"

  api:
    build: .
    container_name: opentrade-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://opentrade:opentrade@db:5432/opentrade
      COMTRADE_API_KEY: ${COMTRADE_API_KEY:-}
    ports:
      - "0.0.0.0:5575:8000"
    volumes:
      - .:/app
    depends_on:
      - db

volumes:
  pgdata:
